// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
/*
╔══════════════════════════════════════════════════════════════════════════════╗
║                         FRONTEND DATA LAYER                                  ║
║                    API Integration & Client Caching                          ║
╚══════════════════════════════════════════════════════════════════════════════╝

📚 PURPOSE:
This file is the BRIDGE between the frontend (what you see) and the backend (the API).
It handles:
  1. Finding the backend server (port detection)
  2. Fetching data from backend API endpoints
  3. Caching responses in browser memory (8-hour TTL)
  4. Providing fallback data if backend is unavailable
  5. Making data available to React components

Think of this as the "Data Manager" for the frontend!

🔄 DATA FLOW:
  React Component → data.jsx → Backend API → TMDB → Backend → data.jsx → React Component
       ↑                                                                        ↓
       └────────────────────────────────────────────────────────────────────────┘
                              (data flows in a circle)

💾 WHY CLIENT-SIDE CACHING?
Even though the backend caches TMDB responses for 8 hours, we ALSO cache on the
client side because:
  1. Faster: No network request needed if data is already in memory
  2. Offline support: Can show cached data even if backend is down
  3. Reduced backend load: Fewer requests = faster backend
  4. Better UX: Instant page loads when navigating back to previous pages

⚡ KEY FEATURES:
  - Automatic port detection (tries 5001, then 5000)
  - Tailscale support (uses window.location.hostname instead of hardcoded localhost)
  - 8-hour cache matching backend TTL
  - Fallback data when backend unavailable
  - Global state management (ITEMS, HERO_LIST, ROWS)

🌐 TAILSCALE SUPPORT:
Instead of hardcoding "localhost", we use window.location.hostname which means:
  - On computer: http://localhost:8080 → Backend at localhost:5001
  - On phone: http://192.168.1.5:8080 → Backend at 192.168.1.5:5001
  - With Tailscale: http://mac-mini.tailscale.net:8080 → Backend at mac-mini.tailscale.net:5001

This makes remote access work automatically!

📦 WHAT THIS FILE EXPORTS:
Global variables (available everywhere):
  - ITEMS: Object mapping item IDs to item data (e.g., ITEMS['movie_550'] = Fight Club data)
  - HERO_LIST: Array of item IDs for hero carousel (e.g., ['movie_550', 'tv_1234'])
  - ROWS: Array of row objects for homepage (trending, recommended, etc.)
  - posterUrl(): Get poster image URL for an item
  - backdropUrl(): Get backdrop image URL for an item
  - landscapeUrl(): Get landscape image URL for an item
  - initializeData(): Load all data from backend
  - fetchWithCache(): Make cached API requests
  - API_BASE_URL: Current backend URL

🔧 HOW TO USE:
In React components:
  await window.initializeData();  // Load all data
  const item = window.ITEMS['movie_550'];  // Get Fight Club
  const posterUrl = window.posterUrl(item);  // Get poster URL
*/

// ═══════════════════════════════════════════════════════════════════════════
// BACKEND CONNECTION CONFIGURATION
// ═══════════════════════════════════════════════════════════════════════════

// List of ports to try for backend (macOS AirPlay often uses 5000)
const BACKEND_PORTS = [5001, 5000];

// Get current host dynamically (supports localhost and Tailscale)
// window.location.hostname returns:
//   - "localhost" when running locally
//   - "192.168.1.5" when accessing from phone on same network
//   - "mac-mini.tailscale.net" when accessing via Tailscale VPN
const CURRENT_HOST = window.location.hostname;

// On HTTPS (Vercel/production) use same-origin immediately so no calls race
// with detectBackendPort() and trigger mixed-content errors.
// Local default is 5001 (gunicorn) — port 5000 is squatted by macOS AirPlay,
// so any fetch racing ahead of detectBackendPort() would stall on it.
let API_BASE_URL = window.location.protocol === 'https:'
  ? `${window.location.origin}/api`
  : `http://${CURRENT_HOST}:5001/api`;

// ngrok free tier shows a browser interstitial for any request with a browser
// User-Agent unless this header is present. Patch fetch globally so every API
// call bypasses it without having to touch each call site individually.
if (window.location.protocol === 'https:') {
  const _origFetch = window.fetch.bind(window);
  window.fetch = (input, init = {}) => {
    const url = typeof input === 'string' ? input : (input?.url ?? '');
    if (url.includes('/api/') || url.startsWith(API_BASE_URL)) {
      init = { ...init, headers: { 'ngrok-skip-browser-warning': '1', 'Cache-Control': 'no-cache', ...(init.headers || {}) } };
    }
    return _origFetch(input, init);
  };
}


// ═══════════════════════════════════════════════════════════════════════════
// BACKEND PORT DETECTION
// ═══════════════════════════════════════════════════════════════════════════

/**
 * DETECT WHICH PORT THE BACKEND IS RUNNING ON
 *
 * What it does: Tries to connect to backend on different ports until one works.
 * This is needed because:
 *   - Port 5000 is often taken by macOS AirPlay
 *   - We want to automatically find the right port
 *
 * How it works:
 *   1. Loop through BACKEND_PORTS array [5001, 5000]
 *   2. Try to fetch /api/health endpoint on each port
 *   3. If response is OK, we found the backend!
 *   4. Update API_BASE_URL to use correct port
 *
 * Returns:
 *   - true if backend found
 *   - false if no backend available on any port
 *
 * Timeout: 1 second per port (don't wait too long)
 */
async function detectBackendPort() {
  // When served over HTTPS (Cloudflare tunnel or production), nginx proxies
  // /api/ on the same origin — no port scanning needed
  if (window.location.protocol === 'https:') {
    API_BASE_URL = `${window.location.origin}/api`;
    console.log(`✅ HTTPS detected — using same-origin API: ${API_BASE_URL}`);
    return true;
  }

  // Local dev: scan ports to find Flask
  for (const port of BACKEND_PORTS) {
    try {
      const response = await fetch(`http://${CURRENT_HOST}:${port}/api/health`, {
        method: 'GET',
        signal: AbortSignal.timeout(1000)
      });
      if (response.ok) {
        API_BASE_URL = `http://${CURRENT_HOST}:${port}/api`;
        console.log(`✅ Connected to backend on ${CURRENT_HOST}:${port}`);
        return true;
      }
    } catch (error) {
      continue;
    }
  }

  console.warn('⚠️ Could not connect to backend. Using fallback data.');
  return false;
}


// ═══════════════════════════════════════════════════════════════════════════
// CLIENT-SIDE CACHE
// ═══════════════════════════════════════════════════════════════════════════

/**
 * CLIENT-SIDE CACHE OBJECT
 *
 * What it stores: API responses in browser memory (RAM, not disk)
 * How it works: Similar to backend cache but lives in the browser
 *
 * Structure:
 *   apiCache = {
 *     data: {
 *       "/hero": [hero items array],
 *       "/trending?type=all": [trending items array],
 *       ...
 *     },
 *     timestamps: {
 *       "/hero": 1234567890123,  (milliseconds since 1970)
 *       "/trending?type=all": 1234567890456,
 *       ...
 *     },
 *     CACHE_DURATION: 28800000  (8 hours in milliseconds)
 *   }
 *
 * Why 8 hours? Matches backend cache TTL so we don't serve stale data
 *
 * Cache lifecycle:
 *   1. First request: Fetch from backend, save to cache
 *   2. Second request: Return from cache (instant!)
 *   3. After 8 hours: Cache expires, fetch from backend again
 */
const apiCache = {
  data: {},
  timestamps: {},
  CACHE_DURATION: 30 * 60 * 1000,
  DISK_DURATION:  2 * 60 * 60 * 1000,
};

const LS_PREFIX = 'halo_cache_';
const LS_VERSION = 'halo_cache_version';
const CACHE_VER = '4';
// Wipe all stale localStorage entries whenever the cache version bumps
try {
  if (localStorage.getItem(LS_VERSION) !== CACHE_VER) {
    Object.keys(localStorage).filter(k => k.startsWith(LS_PREFIX)).forEach(k => localStorage.removeItem(k));
    localStorage.setItem(LS_VERSION, CACHE_VER);
  }
} catch {}

// localStorage helpers — silent on quota errors
function lsGet(endpoint) {
  try {
    const raw = localStorage.getItem(LS_PREFIX + endpoint);
    if (!raw) return null;
    const { ts, data } = JSON.parse(raw);
    if (Date.now() - ts > apiCache.DISK_DURATION) { localStorage.removeItem(LS_PREFIX + endpoint); return null; }
    return { ts, data };
  } catch { return null; }
}
function lsSet(endpoint, data) {
  try { localStorage.setItem(LS_PREFIX + endpoint, JSON.stringify({ ts: Date.now(), data })); } catch {}
}
function clearCacheEntry(endpoint) {
  delete apiCache.data[endpoint];
  delete apiCache.timestamps[endpoint];
  try { localStorage.removeItem(LS_PREFIX + endpoint); } catch {}
}


// ═══════════════════════════════════════════════════════════════════════════
// API REQUEST WITH CACHING
// ═══════════════════════════════════════════════════════════════════════════

/**
 * FETCH DATA FROM BACKEND WITH CACHING
 *
 * This is the main function for getting data from the backend. It automatically
 * handles caching so you don't have to think about it!
 *
 * How it works:
 *   1. Check if we have cached data for this endpoint
 *   2. If yes AND not expired: Return cached data (instant!)
 *   3. If no OR expired: Fetch from backend, cache it, return it
 *   4. If backend error: Return fallback data
 *
 * Parameters:
 *   - endpoint: API path like "/hero" or "/trending?type=all"
 *
 * Returns:
 *   - Array or object with data from backend
 *   - Fallback data if backend unavailable
 *
 * Cache check logic:
 *   - Have cached data? ✓
 *   - Have timestamp? ✓
 *   - Less than 8 hours old? (now - timestamp) < CACHE_DURATION
 *     If all three are true → Use cache!
 *
 * Example:
 *   const heroItems = await fetchWithCache('/hero');
 *   // First call: Fetches from backend (slow)
 *   // Second call: Returns from cache (instant!)
 */
// noBackground: skip the background revalidate (use for detail pages — metadata rarely changes)
async function fetchWithCache(endpoint, { noBackground = false } = {}) {
  const now = Date.now();

  // 1. In-memory hit (fastest — same session navigation)
  if (apiCache.data[endpoint] && apiCache.timestamps[endpoint] &&
      (now - apiCache.timestamps[endpoint]) < apiCache.CACHE_DURATION) {
    return apiCache.data[endpoint];
  }

  // 2. localStorage hit
  const disk = lsGet(endpoint);
  if (disk) {
    apiCache.data[endpoint] = disk.data;
    apiCache.timestamps[endpoint] = disk.ts;
    if (!noBackground) fetchFresh(endpoint);
    return disk.data;
  }

  // 3. Cold fetch — nothing cached anywhere
  return fetchFresh(endpoint);
}

async function fetchFresh(endpoint) {
  try {
    const response = await fetch(`${API_BASE_URL}${endpoint}`);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const result = await response.json();
    if (!result.success) throw new Error(result.error || 'API error');

    const now = Date.now();
    apiCache.data[endpoint] = result.data;
    apiCache.timestamps[endpoint] = now;
    lsSet(endpoint, result.data);

    return result.data;
  } catch (error) {
    console.error(`Failed to fetch ${endpoint}:`, error);
    // Return in-memory stale data if we have it, otherwise fallback
    return apiCache.data[endpoint] || getFallbackData(endpoint);
  }
}


// ═══════════════════════════════════════════════════════════════════════════
// FALLBACK DATA (when backend unavailable)
// ═══════════════════════════════════════════════════════════════════════════

/**
 * GET FALLBACK DATA WHEN BACKEND IS UNAVAILABLE
 *
 * What it does: Returns placeholder data when backend can't be reached.
 * This prevents the app from crashing and shows a helpful message.
 *
 * Why: Better to show placeholder content than a blank screen or error!
 *
 * Parameters:
 *   - endpoint: The API endpoint that failed (e.g., "/hero")
 *
 * Returns:
 *   - Array of placeholder items with instructions to configure API key
 *
 * What fallback items look like:
 *   {
 *     id: 'fallback_1',
 *     title: 'Media Server',
 *     synopsis: 'Configure your TMDB API key...',
 *     poster: 'https://picsum.photos/seed/placeholder/500/750',  (random image)
 *     tone: '#2f86ff',  (nice blue color)
 *     ...
 *   }
 */
function getFallbackData(endpoint) {
  // Base fallback item with helpful message
  const fallbackItem = {
    id: 'fallback_1',
    title: 'Media Server',
    year: '2024',
    rating: 'TV-MA',
    runtime: '2h 00m',
    genre: 'Drama',
    meta: 'Movie · 2024',
    tone: '#2f86ff',  // Nice blue color
    synopsis: 'Configure your TMDB API key in the backend .env file to load real content.',
    poster: 'https://picsum.photos/seed/placeholder/500/750',      // Random placeholder
    backdrop: 'https://picsum.photos/seed/placeholder-bd/1920/1080'  // Random backdrop
  };

  // ───────────────────────────────────────────────────────────────────────
  // Special handling for hero endpoint (needs 5 items with different colors)
  // ───────────────────────────────────────────────────────────────────────

  if (endpoint.includes('hero')) {
    // Create 5 hero items with different colors and titles
    const heroColors = ['#7C5CFF', '#E8623A', '#2BA6E0', '#E2B23A', '#F08CBF'];

    return Array(5).fill(null).map((_, i) => ({
      ...fallbackItem,              // Copy all base properties
      id: `hero_${i}`,              // Unique ID for each hero item
      title: `Featured ${i + 1}`,   // "Featured 1", "Featured 2", etc.
      tone: heroColors[i]           // Different color for each
    }));
  }

  // ───────────────────────────────────────────────────────────────────────
  // Default: Return 8 placeholder items
  // ───────────────────────────────────────────────────────────────────────

  return Array(8).fill(null).map((_, i) => ({
    ...fallbackItem,
    id: `item_${i}`,
    title: `Item ${i + 1}`
  }));
}


// ═══════════════════════════════════════════════════════════════════════════
// GLOBAL STATE VARIABLES
// ═══════════════════════════════════════════════════════════════════════════

/**
 * GLOBAL DATA STORAGE
 *
 * These variables store ALL media data for the app. They're accessible from
 * any React component via window.ITEMS, window.HERO_LIST, etc.
 *
 * Why global? React components need to share the same data. Instead of passing
 * props down through many components, we use global state.
 *
 * ITEMS: Object mapping item IDs to full item data
 *   Example: {
 *     'movie_550': { title: 'Fight Club', year: '1999', ... },
 *     'movie_24': { title: 'Kill Bill', year: '2003', ... },
 *     'tv_1234': { title: 'Breaking Bad', year: '2008', ... }
 *   }
 *
 * HERO_LIST: Array of item IDs for hero carousel
 *   Example: ['movie_550', 'movie_24', 'tv_1234', 'movie_789', 'movie_999']
 *
 * ROWS: Array of row objects for homepage
 *   Example: [
 *     { id: 'tr', label: 'Trending Now', items: ['movie_1', 'movie_2', ...] },
 *     { id: 'rec', label: 'Recommended', items: ['movie_3', 'movie_4', ...] }
 *   ]
 */

// Object to store all media items (movies, TV shows, anime)
// Key = item ID (e.g., "movie_550")
// Value = item data (title, poster, year, etc.)
let ITEMS = {};

// Array of item IDs for hero carousel (the big banner at top)
// Example: ['movie_550', 'tv_1234', 'movie_789']
let HERO_LIST = [];

// Array of row objects for homepage (each row has label and items)
// Example: [{ id: 'trending', label: 'Trending Now', items: [...] }]
let ROWS = [];


// ═══════════════════════════════════════════════════════════════════════════
// DATA INITIALIZATION
// ═══════════════════════════════════════════════════════════════════════════

/**
 * INITIALIZE ALL DATA FROM BACKEND
 *
 * This is the MAIN function that loads all data for the app. Called once when
 * app starts up.
 *
 * What it does:
 *   1. Detect which port backend is running on (5001 or 5000)
 *   2. Fetch ALL data in parallel (faster!)
 *      - Hero items (5 featured items)
 *      - Trending (10 items)
 *      - Recommended (10 items)
 *      - Popular movies (10 items)
 *      - Popular TV shows (10 items)
 *      - Anime (10 items)
 *   3. Combine all items into ITEMS object
 *   4. Set up HERO_LIST array
 *   5. Set up ROWS array
 *
 * Why parallel? Using Promise.all() fetches everything at once instead of
 * one-by-one. Much faster!
 *   Sequential: 6 requests × 100ms = 600ms total
 *   Parallel: 6 requests at once = 100ms total (6x faster!)
 *
 * Lazy loading: Images load as you scroll, not all at once. This saves
 * bandwidth and makes initial load much faster.
 *
 * Error handling: If backend fails, uses fallback data so app still works
 */
async function initializeData() {
  try {
    // ───────────────────────────────────────────────────────────────────────
    // STEP 1: Find backend server (port detection)
    // ───────────────────────────────────────────────────────────────────────

    await detectBackendPort();
    window.API_BASE_URL = API_BASE_URL;

    // ───────────────────────────────────────────────────────────────────────
    // STEP 2: Fetch all data in parallel (Promise.all = runs at same time)
    // ───────────────────────────────────────────────────────────────────────

    // Promise.all runs all fetches simultaneously
    // [a, b, c] = await Promise.all([fetch1, fetch2, fetch3])
    // This is MUCH faster than:
    //   const a = await fetch1;
    //   const b = await fetch2;  (waits for a)
    //   const c = await fetch3;  (waits for b)
    const [heroItems, trending, recommended, movies, tvShows, anime, upcoming] = await Promise.all([
      fetchWithCache('/hero'),                  // 5 featured items
      fetchWithCache('/trending?type=all'),     // 10 trending items
      fetchWithCache('/recommended'),           // 10 recommended movies
      fetchWithCache('/movies'),                // 10 popular movies
      fetchWithCache('/tv'),                    // 10 popular TV shows
      fetchWithCache('/anime'),                 // 10 anime shows
      fetchWithCache('/movies/upcoming').catch(() => []),  // coming soon
    ]);

    // ───────────────────────────────────────────────────────────────────────
    // STEP 3: Combine all items into ITEMS object
    // ───────────────────────────────────────────────────────────────────────

    // Combine all arrays into one big array
    // [...a, ...b] = spread operator, combines arrays
    const allItems = [
      ...heroItems,
      ...trending,
      ...recommended,
      ...movies,
      ...tvShows,
      ...anime,
      ...(upcoming || []),
    ];

    // Convert array to object for fast lookups
    // Array: [item1, item2, item3] → O(n) lookup (slow)
    // Object: { id1: item1, id2: item2 } → O(1) lookup (instant!)
    allItems.forEach(item => {
      ITEMS[item.id] = item;  // Store each item by its ID
    });

    // ───────────────────────────────────────────────────────────────────────
    // STEP 4: Set up HERO_LIST (hero carousel items)
    // ───────────────────────────────────────────────────────────────────────

    // Clear existing array (important for hot-reloading)
    HERO_LIST.length = 0;

    // Add first 5 hero item IDs
    // .map(item => item.id) converts [{id: 'movie_1', ...}, ...] → ['movie_1', ...]
    HERO_LIST.push(...heroItems.slice(0, 5).map(item => item.id));

    // Why push instead of reassign?
    // push modifies existing array (maintains references)
    // reassign creates new array (breaks references in React components)

    // ───────────────────────────────────────────────────────────────────────
    // STEP 5: Set up ROWS (homepage content rows)
    // ───────────────────────────────────────────────────────────────────────

    // Clear existing array
    ROWS.length = 0;

    // Add all content rows
    ROWS.push(
      {
        id: 'tr',
        label: 'Trending Now',
        items: trending.map(item => item.id)
      },
      {
        id: 'top10',
        label: 'Top 10 in the US Today',
        items: trending.slice(0, 10).map(item => item.id)
      },
      {
        id: 'rec',
        label: 'Recommended For You',
        items: recommended.map(item => item.id)
      },
      {
        id: 'mv',
        label: 'Popular Movies',
        items: movies.map(item => item.id)
      },
      {
        id: 'tv',
        label: 'TV Shows',
        items: tvShows.map(item => item.id)
      },
      {
        id: 'an',
        label: 'Anime',
        items: anime.map(item => item.id)
      }
    );
    if ((upcoming || []).length > 0) {
      ROWS.push({
        id: 'coming',
        label: 'Coming Soon',
        items: upcoming.map(item => item.id)
      });
    }

    // Pre-load completed local cache entries for download badges (best-effort)
    fetch(`${API_BASE_URL}/video-cache/list`)
      .then(r => r.json())
      .then(d => {
        if (d.success) {
          window.cachedSet = new Set(
            (d.data || []).map(e => `${e.media_type}_${e.media_id}`)
          );
          // Notify cards to re-render now that cachedSet is ready
          window.dispatchEvent(new CustomEvent('cachedset-ready'));
        }
      })
      .catch(() => {});

    // ───────────────────────────────────────────────────────────────────────
    // STEP 6: Log success message
    // ───────────────────────────────────────────────────────────────────────

    console.log('Data loaded successfully:', {
      totalItems: Object.keys(ITEMS).length,  // How many unique items?
      heroItems: HERO_LIST.length,             // Should be 5
      rows: ROWS.length                        // Should be 5
    });

  } catch (error) {
    // ───────────────────────────────────────────────────────────────────────
    // ERROR HANDLING: Backend unavailable - use fallback data
    // ───────────────────────────────────────────────────────────────────────

    console.error('Failed to initialize data:', error);

    // Get fallback data
    const fallbackHero = getFallbackData('/hero');
    const fallbackItems = getFallbackData('/trending');

    // Populate ITEMS with fallback data
    fallbackHero.forEach(item => ITEMS[item.id] = item);
    fallbackItems.forEach(item => ITEMS[item.id] = item);

    // Set up HERO_LIST with fallback data
    HERO_LIST.length = 0;
    HERO_LIST.push(...fallbackHero.map(item => item.id));

    // Set up ROWS with fallback data
    ROWS.length = 0;
    ROWS.push({
      id: 'fallback',
      label: 'Content (API Not Connected)',
      items: fallbackItems.map(item => item.id)
    });
  }
}


// ═══════════════════════════════════════════════════════════════════════════
// IMAGE URL HELPERS
// ═══════════════════════════════════════════════════════════════════════════

/**
 * GET POSTER IMAGE URL
 *
 * What it does: Returns full URL to poster image for a media item
 *
 * Poster = vertical movie poster (like in movie theaters)
 * Typical size: 500×750 pixels (2:3 aspect ratio)
 *
 * Parameters:
 *   - item: Media item object
 *   - w: Width in pixels (default 600)
 *   - h: Height in pixels (default 900)
 *
 * Returns: Full URL to poster image
 *
 * Example:
 *   const item = ITEMS['movie_550'];
 *   const url = posterUrl(item);
 *   // Returns: "https://image.tmdb.org/t/p/w500/abc123.jpg"
 *
 * Note: Item already has poster URL from backend, we just return it!
 */
function posterUrl(item, w = 600, h = 900) {
  if (item && item.poster) {
    return item.poster;  // Backend already provided full URL
  }

  // No poster available - return placeholder
  // picsum.photos provides random placeholder images
  // seed ensures same ID always gets same placeholder
  return `https://picsum.photos/seed/${item?.id || 'default'}/${w}/${h}`;
}

/**
 * GET BACKDROP IMAGE URL
 *
 * What it does: Returns full URL to backdrop image for a media item
 *
 * Backdrop = wide horizontal image (used for hero banner)
 * Typical size: 2400×1200 pixels (16:9 aspect ratio)
 *
 * Similar to posterUrl but for wide images
 */
function backdropUrl(item, w = 2400, h = 1200) {
  if (item && item.backdrop) {
    return item.backdrop;  // Backend already provided full URL
  }

  // No backdrop - return placeholder with different seed
  return `https://picsum.photos/seed/${item?.id || 'default'}-bd/${w}/${h}`;
}

/**
 * GET LANDSCAPE IMAGE URL
 *
 * What it does: Returns landscape-oriented image (wider than tall)
 *
 * Landscape = horizontal image for cards and grids
 * Typical size: 800×450 pixels (16:9 aspect ratio)
 *
 * Fallback order:
 *   1. Use poster if available
 *   2. Use backdrop if available
 *   3. Use placeholder
 */
function landscapeUrl(item, w = 800, h = 450) {
  if (item && item.poster) {
    return item.poster;  // Use poster as landscape
  }
  if (item && item.backdrop) {
    return item.backdrop;  // Or use backdrop
  }

  // No images - return placeholder
  return `https://picsum.photos/seed/${item?.id || 'default'}-ls/${w}/${h}`;
}

/**
 * MAKE EVERYTHING AVAILABLE GLOBALLY
 *
 * Why: React components need access to this data. We attach everything to
 * the window object so any component can access it.
 *
 * Alternative: Could use React Context or Redux, but this is simpler for
 * a small app and works great!
 *
 * Usage in React components:
 *   const item = window.ITEMS['movie_550'];
 *   const posterUrl = window.posterUrl(item);
 *   await window.initializeData();
 *
 * Object.assign(target, source) copies all properties from source to target
 *
 * After this runs, you can access:
 *   window.ITEMS
 *   window.HERO_LIST
 *   window.ROWS
 *   window.posterUrl
 *   window.backdropUrl
 *   window.landscapeUrl
 *   window.initializeData
 *   window.fetchWithCache
 *   window.API_BASE_URL
 */
Object.assign(window, {
  ITEMS,              // Global items object
  HERO_LIST,          // Global hero list array
  ROWS,               // Global rows array
  posterUrl,          // Poster URL function
  backdropUrl,        // Backdrop URL function
  landscapeUrl,       // Landscape URL function
  initializeData,     // Data loading function
  fetchWithCache,     // Cached fetch function
  clearCacheEntry,    // Invalidate a single cache entry
  API_BASE_URL        // Current backend URL
});

// router.jsx — Simple hash-based routing for category pages


// Simple hash router hook
function useRouter() {
  const [route, setRoute] = useState(() => {
    const hash = window.location.hash.slice(1) || 'home';
    return parseRoute(hash);
  });

  useEffect(() => {
    const handleHashChange = () => {
      const hash = window.location.hash.slice(1) || 'home';
      setRoute(parseRoute(hash));
    };

    window.addEventListener('hashchange', handleHashChange);
    return () => window.removeEventListener('hashchange', handleHashChange);
  }, []);

  return route;
}

function parseRoute(hash) {
  const parts = hash.split('/');
  const page = parts[0] || 'home';

  // Parse detail pages: detail/movie/123
  if (page === 'detail' && parts.length === 3) {
    return {
      page: 'detail',
      params: {
        mediaType: parts[1],
        mediaId: parts[2]
      }
    };
  }

  // Parse sport detail: sport/{gameId}
  if (page === 'sport' && parts.length === 2) {
    return { page: 'sport', params: { gameId: parts[1] } };
  }

  // Parse genre pages: genre/movies or genre/movies/Action
  if (page === 'genre' && parts.length >= 2) {
    return {
      page: 'genre',
      params: {
        mediaType: parts[1],
        genreName: parts[2] ? decodeURIComponent(parts[2]) : null
      }
    };
  }

  return {
    page: page,
    params: parts.slice(1)
  };
}

function navigate(path) {
  window.location.hash = path;
}

// Lazy loading image component (same as in components.jsx)
function LazyImageCat({ src, alt = "", ...props }) {
  const imgRef = useRef(null);
  const [isLoaded, setIsLoaded] = useState(false);
  const [imageSrc, setImageSrc] = useState('data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450"%3E%3Crect fill="%23161b26" width="300" height="450"/%3E%3C/svg%3E');

  useEffect(() => {
    const img = imgRef.current;
    if (!img) return;

    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting && !isLoaded) {
            setImageSrc(src);
            setIsLoaded(true);
          }
        });
      },
      {
        rootMargin: '200px',
        threshold: 0.01
      }
    );

    observer.observe(img);
    return () => { if (img) observer.unobserve(img); };
  }, [src, isLoaded]);

  return <img ref={imgRef} src={imageSrc} alt={alt} draggable="false" {...props} />;
}

// Larger card for category pages (portrait poster style)
function CategoryCard({ item, glowMode, glowIntensity, cardRadius }) {
  const ref = useRef(null);
  const [hover, setHover] = useState(false);
  const [tilt, setTilt] = useState({ rx: 0, ry: 0 });
  const tone = glowMode === 'tone' ? item.tone : '#2f86ff';

  function handleClick() {
    const [type, id] = item.id.split('_');
    navigate(`detail/${type}/${id}`);
  }

  function onMove(e) {
    const el = ref.current;
    if (!el) return;
    const r = el.getBoundingClientRect();
    const px = (e.clientX - r.left) / r.width;
    const py = (e.clientY - r.top) / r.height;
    const ry = (px - 0.5) * 8;
    const rx = (0.5 - py) * 6;
    setTilt({ rx, ry });
  }

  function onLeave() {
    setHover(false);
    setTilt({ rx: 0, ry: 0 });
  }

  const style = {
    '--glow': tone,
    '--glow-a': hexA(tone, 0.55 * glowIntensity),
    '--glow-b': hexA(tone, 0.32 * glowIntensity),
    '--glow-c': hexA(tone, 0.18 * glowIntensity),
    '--card-radius': cardRadius + 'px',
  };

  return (
    <div
      ref={ref}
      className={'category-card' + (hover ? ' is-hover' : '')}
      tabIndex={0}
      style={style}
      onMouseEnter={() => setHover(true)}
      onMouseMove={onMove}
      onMouseLeave={onLeave}
      onFocus={() => setHover(true)}
      onBlur={onLeave}
      onClick={handleClick}
    >
      <div className="category-card__shelf" aria-hidden="true"></div>
      <div
        className="category-card__lift"
        style={{
          transform: hover
            ? `perspective(1200px) rotateX(${tilt.rx}deg) rotateY(${tilt.ry}deg) translateY(-8px) scale(1.05)`
            : 'perspective(1200px) rotateX(0) rotateY(0) translateY(0) scale(1)'
        }}
      >
        <div className="category-card__art">
          <LazyImageCat src={item.poster || landscapeUrl(item)} alt={item.title} />
          <div className="card__glass-rim"></div>
          <div className="card__reflection"></div>
          <div className="card__sheen" style={{ '--mx': (tilt.ry + 5) * 4 + 'px', '--my': (-tilt.rx + 4) * 4 + 'px' }}></div>
          <div className="card__top-light"></div>
          <div className="card__inner-stroke"></div>
        </div>
      </div>

      <div className="card__neon" aria-hidden="true">
        <div className="card__neon-cast"></div>
      </div>

      <div className="category-card__info">
        <div className="category-card__title">{item.title}</div>
        <div className="category-card__meta">
          {item.year && <span>{item.year}</span>}
          {item.rating && <><span className="hero__sep"></span><span>{item.rating}</span></>}
          {item.vote_average && (
            <>
              <span className="hero__sep"></span>
              <span className="rating-badge">★ {item.vote_average.toFixed(1)}</span>
            </>
          )}
        </div>
        {item.overview && (
          <div className="category-card__overview">
            {item.overview.slice(0, 150)}{item.overview.length > 150 ? '...' : ''}
          </div>
        )}
      </div>
    </div>
  );
}

      if (item.imdb_id) sp.set('imdbId', item.imdb_id);
      if (season)  { sp.set('season', season); sp.set('episode', episode); }
      const result = await fetch(`${streamUrl}?${sp}`).then(r => r.json());
      if (!result.success) throw new Error(result.error || 'Stream not found');

      const { stream_url, filename } = result.data;
      const dlTitle = epTitle || item.title;
      const proxyParams = new URLSearchParams({ url: stream_url, download: '1', dlname: dlTitle });
      if (filename) proxyParams.set('filename', filename);
      window.location.href = `${window.API_BASE_URL}/stream/proxy?${proxyParams}`;
    } catch (err) {
      console.error('Download failed:', err);
      alert('Could not start download: ' + err.message);
    } finally {
      setTimeout(() => setDownloading(null), 4000);
    }
  }

  if (loading) {
    return (
      <div style={{ padding: '80px var(--gutter)', textAlign: 'center' }}>
        <div style={{ fontSize: '48px', marginBottom: '16px' }}>🎬</div>
        <div style={{ fontSize: '18px', color: 'var(--txt-1)' }}>Loading details...</div>
      </div>
    );
  }

  if (!item) {
    return (
      <div style={{ padding: '80px var(--gutter)', textAlign: 'center' }}>
        <div style={{ fontSize: '48px', marginBottom: '16px' }}>😕</div>
        <div style={{ fontSize: '18px', color: 'var(--txt-1)', marginBottom: '24px' }}>Content not found</div>
        <button className="btn btn--glass" onClick={() => navigate('home')}>Back to Home</button>
      </div>
    );
  }

  const hasProgress = progress > 0;
  const overview = item.overview || item.synopsis || 'No description available.';
  const shouldTruncate = overview.length > 300;
  const displayText = (!expanded && shouldTruncate) ? overview.slice(0, 300) + '...' : overview;

  return (
    <div className="detail-page">
      {/* Hero Backdrop / Trailer */}
      <div className="detail-hero" style={{ '--detail-tone': item.tone }}>
        <img
          src={item.backdrop_large || item.backdrop || backdropUrl(item)}
          alt=""
          className={'detail-hero__img' + (showTrailer ? ' detail-hero__img--hidden' : '')}
        />

        {/* Trailer iframe — autoplays muted on desktop; tap-to-play inline on iOS */}
        {showTrailer && trailerKey && (
          <iframe
            className={'detail-hero__trailer' + (IS_IOS ? ' detail-hero__trailer--ios' : '')}
            src={IS_IOS
              ? `https://www.youtube.com/embed/${trailerKey}?autoplay=0&rel=0&playsinline=1&modestbranding=1`
              : `https://www.youtube.com/embed/${trailerKey}?autoplay=1&mute=1&rel=0&playsinline=1&modestbranding=1`}
            allow="autoplay; fullscreen"
            allowFullScreen
          />
        )}

        {/* Dismiss button — shown once trailer is in the banner */}
        {showTrailer && (
          <button
            className="detail-hero__trailer-dismiss"
            onClick={() => { setShowTrailer(false); clearTimeout(trailerTimerRef.current); }}
            aria-label="Close trailer"
          >
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
              <path d="M18 6 6 18M6 6l12 12"/>
            </svg>
          </button>
        )}

        {/* iOS: Watch Trailer button — tapping it swaps backdrop for the iframe */}
        {showTrailerBtn && !showTrailer && trailerKey && (
          <button className="detail-hero__trailer-btn" onClick={() => setShowTrailer(true)}>
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
            Watch Trailer
          </button>
        )}

        <div className="detail-hero__scrim"></div>
        <div className="detail-hero__tone"></div>
      </div>

      {/* Content */}
      <div className="detail-content">
        <button className="back-button detail-back" onClick={() => {
          const dest = mediaType === 'movie' ? 'movies' : mediaType === 'anime' ? 'anime' : 'tv';
          window.navigate(dest);
        }}>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
            <path d="m15 6-6 6 6 6"/>
          </svg>
          Back
        </button>

        <div className="detail-main">
          {/* Poster */}
          <div className="detail-poster">
            <img src={item.poster || posterUrl(item)} alt={item.title} />
            <div className="detail-poster__glow" style={{ background: `radial-gradient(circle at 50% 100%, ${item.tone}40 0%, transparent 70%)` }}></div>
          </div>

          {/* Info */}
          <div className="detail-info">
            <h1 className="detail-title">{item.title}</h1>

            <div className="detail-meta">
              {item.year && <span>{item.year}</span>}
              {item.rating && <><span className="meta-sep">•</span><span className="rating-badge">{item.rating}</span></>}
              {item.runtime && <><span className="meta-sep">•</span><span>{item.runtime}</span></>}
              {item.vote_average && (
                <>
                  <span className="meta-sep">•</span>
                  <span className="star-rating">★ {item.vote_average.toFixed(1)}</span>
                </>
              )}
            </div>

            {item.genre && (
              <div className="detail-genres">
                {item.genre.split(' · ').map((g, i) => (
                  <span key={i} className="genre-tag">{g}</span>
                ))}
              </div>
            )}

            {/* Play/Resume Section */}
            <div className="detail-actions">
              <button
                className="btn btn--primary btn--large"
                onClick={() => {
                  if ((mediaType === 'tv' || mediaType === 'anime') && item.seasons && item.seasons.length > 0) {
                    playEpisode(1, 1);
                  } else {
                    const posterP   = encodeURIComponent(item.poster   || '');
                    const backdropP = encodeURIComponent(item.backdrop || '');
                    const toneP     = encodeURIComponent(item.tone     || '#2f86ff');
                    const idKey2    = item.imdb_id ? `imdb=${item.imdb_id}` : `tmdb=${item.tmdb_id}`;
                    const embedSrc  = `https://vidsrc-embed.ru/embed/movie?${idKey2}`;
                    const imdbParam = item.imdb_id ? `&imdbId=${item.imdb_id}` : '';
                    const genreP2   = encodeURIComponent(item.genre || '');
                    window.location.href = `/player.html?type=${mediaType}&id=${mediaId}&title=${encodeURIComponent(item.title)}&src=${encodeURIComponent(embedSrc)}&poster=${posterP}&backdrop=${backdropP}&tone=${toneP}&genre=${genreP2}${imdbParam}`;
                  }

              >
                <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                  <path fill="currentColor" d="M8 5v14l11-7z"/>
                </svg>
                {hasProgress ? 'Resume' : 'Play'}
              </button>

              {/* Start Over — only shown when there's saved progress */}
              {hasProgress && (
                <button
                  className="btn btn--glass btn--large"
                  onClick={() => {
                    if ((mediaType === 'tv' || mediaType === 'anime') && item.seasons && item.seasons.length > 0) {

                      const backdropP = encodeURIComponent(item.backdrop || '');

                      const idKey2    = item.imdb_id ? `imdb=${item.imdb_id}` : `tmdb=${item.tmdb_id}`;
                      const embedSrc  = `https://vidsrc-embed.ru/embed/movie?${idKey2}`;
                      const imdbParam = item.imdb_id ? `&imdbId=${item.imdb_id}` : '';
                      const genreP3   = encodeURIComponent(item.genre || '');
                      window.location.href = `/player.html?type=${mediaType}&id=${mediaId}&title=${encodeURIComponent(item.title)}&src=${encodeURIComponent(embedSrc)}&poster=${posterP}&backdrop=${backdropP}&tone=${toneP}&genre=${genreP3}${imdbParam}&startOver=1`;

                  ) : (
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">

                </button>

            </div>

            {/* Progress Bar */}
            {hasProgress && (
              <div className="detail-progress">
                {progressData?.season > 0 && (
                  <div className="detail-progress-episode">
                    S{progressData.season} E{progressData.episode}

                )}
                <div className="detail-progress-bar">
                  <div
                    className="detail-progress-fill"
                    style={{
                      width: `${progress * 100}%`,
                      background: `linear-gradient(90deg, ${item.tone}, white)`
                    }}

                </div>
                <div className="detail-progress-text">
                  {Math.round(progress * 100)}% watched • {Math.round((1 - progress) * 120)} min remaining
                </div>
              </div>
            )}

            {/* Description */}
            <div className="detail-description">
              <h2 className="detail-section-title">Overview</h2>
              <p className="detail-overview">
                {displayText}
                {shouldTruncate && (
                  <button
                    className="see-more-btn"
                    onClick={() => setExpanded(!expanded)}
                  >
                    {expanded ? 'Show less' : 'See more'}
                  </button>
                )}
              </p>
            </div>

            {/* Cast / Additional Info */}
            {item.cast && item.cast.length > 0 && (
              <div className="detail-cast">
                <h3 className="detail-subsection-title">Cast</h3>
                <div className="detail-cast-list">
                  {item.cast.slice(0, 5).map((actor, i) => (
                    <div key={i} className="cast-member">
                      <span className="cast-name">{actor.name}</span>
                      <span className="cast-character">{actor.character}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>

        {/* Seasons & Episodes — TV/Anime only */}
        {(mediaType === 'tv' || mediaType === 'anime') && item && item.seasons && item.seasons.length > 0 && (
          <div className="detail-seasons">
            <div className="seasons-header">
              <h2 className="detail-section-title">Episodes</h2>
              <div className="season-selector">
                <button
                  className="season-dropdown-btn"
                  onClick={() => setSeasonDropdownOpen(o => !o)}
                >
                  {item.seasons.find(s => s.season_number === selectedSeason)?.name || `Season ${selectedSeason}`}
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
                    <path d={seasonDropdownOpen ? 'M18 15l-6-6-6 6' : 'M6 9l6 6 6-6'}/>
                  </svg>
                </button>
                {seasonDropdownOpen && (
                  <div className="season-dropdown">
                    {item.seasons.map(s => (
                      <button
                        key={s.season_number}
                        className={`season-option${s.season_number === selectedSeason ? ' active' : ''}`}
                        onClick={() => { setSelectedSeason(s.season_number); setSeasonDropdownOpen(false); }}
                      >
                        <span>{s.name}</span>
                        <span className="season-ep-count">{s.episode_count} ep</span>
                      </button>
                    ))}
                  </div>
                )}
              </div>
            </div>

            {episodesLoading ? (
              <div className="episodes-loading">Loading episodes...</div>
            ) : (
              <div className="episodes-list">
                {episodes.map(ep => {
                  const epKey = `${selectedSeason}_${ep.episode_number}`;
                  const isWatched = watchedEpisodes.has(epKey);
                  const isActive = progressData &&
                    progressData.season === selectedSeason &&
                    progressData.episode === ep.episode_number;
                  const activePct = isActive ? Math.round((progressData.progress || 0) * 100) : 0;
                  return (
                  <div key={ep.episode_number} className="episode-card" onClick={() => playEpisode(selectedSeason, ep.episode_number)}>
                    <div className="episode-still">
                      {ep.still
                        ? <img src={ep.still} alt={ep.name} loading="lazy" />
                        : (
                          <div className="episode-still-placeholder">
                            <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
                              <path d="M8 5v14l11-7z"/>
                            </svg>
                          </div>
                        )
                      }
                      <div className="episode-play-overlay">
                        <svg viewBox="0 0 24 24" width="40" height="40">
                          <circle cx="12" cy="12" r="11" fill="rgba(255,255,255,0.95)"/>
                          <path fill="#08090d" d="M10 8v8l6-4z"/>
                        </svg>
                      </div>
                      <div className="episode-num-badge">E{ep.episode_number}</div>
                      {isWatched && (
                        <div className="ep-watched-check">
                          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round">
                            <path d="M5 13l4 4L19 7"/>
                          </svg>
                        </div>
                      )}
                      {isActive && (
                        <div className="ep-active-bar">
                          <div className="ep-active-bar__fill" style={{width: activePct + '%'}}/>
                        </div>
                      )}
                    </div>
                    <div className="episode-info">
                      <div className="episode-info-top">
                        <div className="episode-title">{ep.name}</div>
                        <button
                          className="episode-dl-btn"
                          aria-label="Download episode"
                          disabled={downloading === `s${selectedSeason}e${ep.episode_number}`}
                          onClick={e => { e.stopPropagation(); downloadItem(selectedSeason, ep.episode_number, `${item.title}.S${String(selectedSeason).padStart(2,'0')}E${String(ep.episode_number).padStart(2,'0')}`); }}
                        >
                          {downloading === `s${selectedSeason}e${ep.episode_number}` ? (
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                              <circle cx="12" cy="12" r="10" opacity="0.25"/>
                              <path d="M12 2 A10 10 0 0 1 22 12" opacity="0.75">
                                <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="1s" repeatCount="indefinite"/>
                              </path>
                            </svg>
                          ) : (
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                            </svg>
                          )}
                        </button>
                      </div>
                      <div className="episode-meta">
                        {ep.runtime ? <span>{ep.runtime}m</span> : null}
                        {ep.vote_average > 0 ? <span>★ {ep.vote_average.toFixed(1)}</span> : null}
                      </div>
                      {ep.overview ? (
                        <p className="episode-overview">
                          {ep.overview.length > 140 ? ep.overview.slice(0, 140) + '…' : ep.overview}
                        </p>
                      ) : null}
                    </div>
                  </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* Similar Content */}
        {similar.length > 0 && (
          <div className="detail-similar">
            <h2 className="detail-section-title">More Like This</h2>
            <div className="detail-similar-grid">
              {similar.map(similarItem => {
                const fullItem = ITEMS[similarItem.id] || similarItem;
                return (
                  <div
                    key={similarItem.id}
                    className="similar-card"
                    onClick={() => {
                      const [type, id] = similarItem.id.split('_');
                      navigate(`detail/${type}/${id}`);
                    }}
                  >
                    <div className="similar-card__poster">
                      <img src={fullItem.poster || landscapeUrl(fullItem)} alt={fullItem.title} />
                      <div className="similar-card__overlay">
                        <svg viewBox="0 0 24 24" width="32" height="32">
                          <circle cx="12" cy="12" r="11" fill="rgba(255,255,255,0.95)" />
                          <path fill="#08090d" d="M10 8v8l6-4z"/>
                        </svg>
                      </div>
                    </div>
                    <div className="similar-card__info">
                      <div className="similar-card__title">{fullItem.title}</div>
                      <div className="similar-card__meta">
                        {fullItem.year} • {fullItem.rating}
                        {fullItem.vote_average && ` • ★ ${fullItem.vote_average.toFixed(1)}`}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// Search Page
// ─────────────────────────────────────────────────────────────────────────────

const SEARCH_CARD_LIMIT = 4;

function SearchPage() {
  const [query, setQuery]               = useState('');
  const [results, setResults]           = useState({ movies: [], tv: [], total: 0 });
  const [loading, setLoading]           = useState(false);
  const [searched, setSearched]         = useState(false);
  const [showSuggest, setShowSuggest]   = useState(false);
  const [suggestIdx, setSuggestIdx]     = useState(-1);
  const [moviesExpanded, setMoviesExp]  = useState(false);
  const [tvExpanded, setTvExp]          = useState(false);
  const inputRef    = useRef(null);
  const wrapperRef  = useRef(null);
  const debounceRef = useRef(null);

  // Build suggestion list from current results (interleaved, max 8)
  const suggestions = React.useMemo(() => {
    const mvs = results.movies.slice(0, 5).map(i => ({ ...i, _kind: 'Movie' }));
    const tvs = results.tv.slice(0, 5).map(i => ({ ...i, _kind: 'TV' }));
    const merged = [];
    const len = Math.max(mvs.length, tvs.length);
    for (let i = 0; i < len; i++) {
      if (mvs[i]) merged.push(mvs[i]);
      if (tvs[i]) merged.push(tvs[i]);
    }
    return merged.slice(0, 8);
  }, [results]);

  useEffect(() => { inputRef.current?.focus(); }, []);

  // Close dropdown on outside click
  useEffect(() => {
    function onDown(e) {
      if (wrapperRef.current && !wrapperRef.current.contains(e.target)) {
        setShowSuggest(false);
      }
    }
    document.addEventListener('mousedown', onDown);
    return () => document.removeEventListener('mousedown', onDown);
  }, []);

  // Debounced search
  useEffect(() => {
    clearTimeout(debounceRef.current);
    if (!query.trim()) {
      setResults({ movies: [], tv: [], total: 0 });
      setSearched(false);
      setLoading(false);
      setShowSuggest(false);
      setMoviesExp(false);
      setTvExp(false);
      return;
    }
    setLoading(true);
    setSearched(true);
    debounceRef.current = setTimeout(async () => {
      try {
        const data = await window.fetchWithCache(`/search?q=${encodeURIComponent(query)}`);
        setResults(data);
        setShowSuggest(true);
        setSuggestIdx(-1);
        setMoviesExp(false);
        setTvExp(false);
      } catch {
        setResults({ movies: [], tv: [], total: 0 });
      } finally {
        setLoading(false);
      }
    }, 350);
    return () => clearTimeout(debounceRef.current);
  }, [query]);

  function goToItem(item) {
    const [type, id] = item.id.split ? item.id.split('_') : [item._kind === 'Movie' ? 'movie' : 'tv', item.id];
    navigate(`detail/${type}/${id}`);
  }

  function onKeyDown(e) {
    if (!showSuggest || suggestions.length === 0) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setSuggestIdx(i => Math.min(i + 1, suggestions.length - 1));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      setSuggestIdx(i => Math.max(i - 1, -1));
    } else if (e.key === 'Enter' && suggestIdx >= 0) {
      e.preventDefault();
      goToItem(suggestions[suggestIdx]);
    } else if (e.key === 'Escape') {
      setShowSuggest(false);
    }
  }

  function SectionCards({ items, expanded, onExpand, label }) {
    const visible = expanded ? items : items.slice(0, SEARCH_CARD_LIMIT);
    const hidden = items.length - SEARCH_CARD_LIMIT;
    return (
      <div className="search-section">
        <div className="search-section-head">
          <h2 className="search-section-title">{label}</h2>
          {!expanded && hidden > 0 && (
            <button className="search-view-all" onClick={onExpand}>
              View all {items.length}
              <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                <path d="m9 6 6 6-6 6"/>
              </svg>
            </button>
          )}
        </div>
        <div className="search-grid">
          {visible.map(item => (
            <CategoryCard key={item.id} item={item} glowMode="tone" glowIntensity={1.7} cardRadius={21} />
          ))}
        </div>
      </div>
    );
  }

  return (
    <div className="search-page">
      <div className="search-header">
        <button className="back-button" onClick={() => navigate('home')}>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
            <path d="m15 6-6 6 6 6"/>
          </svg>
          Back to Home
        </button>
        <h1 className="page-title">Search</h1>
      </div>

      <form className="search-form" onSubmit={e => e.preventDefault()}>
        <div className="search-input-wrapper" ref={wrapperRef}>
          <svg className="search-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
          <input
            ref={inputRef}
            type="text"
            className="search-input"
            placeholder="Movies, shows, anime..."
            value={query}
            onChange={e => setQuery(e.target.value)}
            onFocus={() => suggestions.length > 0 && setShowSuggest(true)}
            onKeyDown={onKeyDown}
            autoComplete="off"
          />
          {query && (
            <button type="button" className="search-clear"
              onClick={() => { setQuery(''); setShowSuggest(false); inputRef.current?.focus(); }}>
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">

            <div className="search-spinner">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
                <circle cx="12" cy="12" r="10" opacity="0.25"/>
                <path d="M12 2 A10 10 0 0 1 22 12" opacity="0.75">
                  <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="1s" repeatCount="indefinite"/>
                </path>
              </svg>
            </div>
          )}

          {/* Autocomplete dropdown */}
          {showSuggest && suggestions.length > 0 && (
            <div className="search-suggest">
              {suggestions.map((item, idx) => {
                const thumbSrc = item.poster
                  ? `https://image.tmdb.org/t/p/w92${item.poster}`
                  : (item.backdrop ? `https://image.tmdb.org/t/p/w300${item.backdrop}` : null);
                return (
                  <div
                    key={item.id + idx}
                    className={'search-suggest__item' + (idx === suggestIdx ? ' is-active' : '')}
                    onMouseEnter={() => setSuggestIdx(idx)}
                    onMouseDown={e => { e.preventDefault(); goToItem(item); }}
                  >
                    <div className="search-suggest__thumb">
                      {thumbSrc
                        ? <img src={thumbSrc} alt="" draggable="false" />
                        : <div className="search-suggest__thumb-ph" />}

                    <div className="search-suggest__info">
                      <span className="search-suggest__title">{item.title}</span>
                      {item.year && <span className="search-suggest__year">{item.year}</span>}
                    </div>
                    <span className="search-suggest__badge">{item._kind}</span>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </form>

      {!loading && searched && results.total === 0 && (
        <div className="search-empty">
          <div style={{ fontSize: '48px', marginBottom: '16px' }}>😕</div>
          <div style={{ fontSize: '18px', marginBottom: '8px' }}>No results found</div>
          <div style={{ fontSize: '14px', color: 'var(--txt-1)' }}>Try different keywords</div>
        </div>

      {results.total > 0 && (
        <div className="search-results" onClick={() => setShowSuggest(false)}>

            <SectionCards
              items={results.movies}
              expanded={moviesExpanded}
              onExpand={() => setMoviesExp(true)}

              expanded={tvExpanded}

    </div>
  );
}

async function loadContinueWatching() {
  const pid = window.currentProfileId || 1;
  const data = await window.fetchWithCache(`/progress/continue-watching?profile_id=${pid}`) || [];
  return data.map(item => ({
    id: `${item.media_type}_${item.media_id}`,
    mediaId: item.media_id,
    mediaType: item.media_type,
    title: item.title,
    poster: item.poster,
    backdrop: item.backdrop,
    tone: item.tone,
    progress: item.progress,
    season: item.season || 0,
    episode: item.episode || 0,
    genre: item.genre || '',
    isMovie: item.media_type === 'movie',
  }));
}

function HistoryRingProgress({ progress, tone, size }) {
  const s = size || 52;
  const r = (s - 12) / 2;
  const cx = s / 2;
  const circ = 2 * Math.PI * r;
  const arc = circ * Math.min(Math.max(progress || 0, 0), 1);
  const pct = Math.round((progress || 0) * 100);
  return (
    <svg width={s} height={s} viewBox={`0 0 ${s} ${s}`} style={{ display: 'block' }}>
      <circle cx={cx} cy={cx} r={r + 3} fill="rgba(255,255,255,0.92)"/>
      <circle cx={cx} cy={cx} r={r} fill="none" stroke="rgba(0,0,0,0.1)" strokeWidth="5"/>
      <circle cx={cx} cy={cx} r={r} fill="none"
        stroke={tone || '#2f86ff'} strokeWidth="5"
        strokeLinecap="round"
        strokeDasharray={`${arc} ${circ - arc}`}
        transform={`rotate(-90 ${cx} ${cx})`}/>
      <text x={cx} y={cx} textAnchor="middle" dominantBaseline="central"
        fill="#08090d" fontSize={Math.round(s * 0.22)} fontWeight="800" fontFamily="system-ui,sans-serif">
        {pct}%
      </text>
    </svg>
  );
}

function HistoryListItem({ item, onDelete }) {
  function handleClick() {
    navigate(`detail/${item.mediaType}/${item.mediaId}`);
  }

  async function handleDelete(e) {
    e.stopPropagation();
    const pid = window.currentProfileId || 1;
    try {
      await fetch(`${window.API_BASE_URL}/progress/delete/${item.mediaType}/${item.mediaId}?profile_id=${pid}`, { method: 'DELETE' });
      onDelete?.(item.id);
    } catch (_) {}
  }

  const epLabel = item.isMovie
    ? (item.genre || 'Movie')
    : (item.genre || (item.season > 0 ? `S${item.season} · E${item.episode}` : 'TV Show'));
  const pct = Math.round((item.progress || 0) * 100);

  return (
    <div className="hist-row" onClick={handleClick}>
      <div className="hist-poster">
        <img src={posterUrl(item)} alt="" loading="lazy" draggable="false"/>
        <div className="hist-ring">
          <HistoryRingProgress progress={item.progress} tone={item.tone} size={52}/>
        </div>
      </div>
      <div className="hist-info">
        <div className="hist-title">{item.title}</div>
        <div className="hist-sub">{epLabel}</div>
        <div className="hist-pct" style={{ color: item.tone || 'var(--acc)' }}>{pct}% watched</div>
      </div>
      <button className="hist-del" onClick={handleDelete} aria-label="Remove from history">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
      </button>
    </div>
  );
}

function GenreRow({ genreName, items }) {
  const scrollerRef = useRef(null);
  const [canL, setCanL] = useState(false);
  const [canR, setCanR] = useState(true);

  function update() {
    const el = scrollerRef.current;
    if (!el) return;
    setCanL(el.scrollLeft > 4);
    setCanR(el.scrollLeft + el.clientWidth < el.scrollWidth - 4);
  }

  useEffect(() => {
    update();
    const el = scrollerRef.current;
    if (!el) return;
    el.addEventListener('scroll', update, { passive: true });
    window.addEventListener('resize', update);
    return () => {
      el.removeEventListener('scroll', update);
      window.removeEventListener('resize', update);
    };
  }, []);

  function nudge(dir) {
    const el = scrollerRef.current;
    if (!el) return;
    el.scrollBy({ left: dir * Math.round(el.clientWidth * 0.85), behavior: 'smooth' });
  }

  return (
    <section className="genre-section">
      <h2 className="genre-section-title">{genreName}</h2>
      <div className="row__wrap">
        <button
          className={'rownav rownav--l' + (canL ? '' : ' is-off')}
          aria-label="Scroll left"
          onClick={() => nudge(-1)}
        >
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
            <path d="m15 6-6 6 6 6"/>
          </svg>
        </button>
        <div className="genre-row__scroll" ref={scrollerRef}>
          {items.map(item => (
            <div key={item.id} className="genre-card-wrapper">
              <CategoryCard item={item} glowMode="tone" glowIntensity={1.7} cardRadius={21} />
            </div>
          ))}
        </div>
        <button
          className={'rownav rownav--r' + (canR ? '' : ' is-off')}
          aria-label="Scroll right"
          onClick={() => nudge(1)}
        >
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
            <path d="m9 6 6 6-6 6"/>
          </svg>
        </button>
      </div>
    </section>
  );
}

const GENRE_CFG = {

// Renders a single genre row only once it scrolls near the viewport
function LazyGenreRow({ genreName, items, onOpen, mediaType }) {
  const wrapRef = useRef(null);
  const [revealed, setRevealed] = useState(false);

  React.useLayoutEffect(() => {
    const el = wrapRef.current;
    if (!el) return;
    // Rows already near the viewport reveal instantly (before paint) — no flash
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight + 300) {
      setRevealed(true);
      return;
    }
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setRevealed(true); obs.disconnect(); } },
      { rootMargin: '200px 0px' }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);

  const row = { id: `g-${genreName}`, label: genreName, layout: 'portrait', items };
  const seeAll = mediaType
    ? () => navigate(`genre/${mediaType}/${encodeURIComponent(genreName)}`)
    : null;

  return (
    <div ref={wrapRef} className={'lazy-genre-row' + (revealed ? ' is-revealed' : '')}>
      {revealed ? (
        <Row row={row} onOpen={onOpen} onSeeAll={seeAll}/>
      ) : (
        <div className="lazy-genre-row__skeleton">
          <div className="lazy-genre-row__sk-title"/>
          <div className="lazy-genre-row__sk-cards">
            {[0,1,2,3,4,5].map(i => <div key={i} className="lazy-genre-row__sk-card"/>)}
          </div>
        </div>
      )}
    </div>
  );
}
